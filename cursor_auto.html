<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; font-weight: normal; }
    #score { font-size: 1.25rem; margin-bottom: 12px; }
    #game-wrap {
      position: relative;
      max-height: min(600px, 85vh);
      max-width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #canvas {
      display: block;
      background: #000;
      border: 1px solid #222;
      max-height: min(600px, 85vh);
      width: auto;
      height: auto;
      max-width: 100%;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 24px;
    }
    .modal h2 { font-size: 1.5rem; margin-bottom: 16px; font-weight: normal; }
    .modal p { margin-bottom: 8px; line-height: 1.5; color: #ccc; max-width: 320px; text-align: center; }
    .modal ul { list-style: none; margin: 16px 0; color: #ccc; }
    .modal li { margin: 6px 0; }
    .modal button {
      margin-top: 24px;
      padding: 12px 24px;
      font-family: monospace;
      font-size: 1rem;
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      cursor: pointer;
    }
    .modal button:hover { background: #000; color: #fff; }
    #game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    #game-over-overlay.visible { display: flex; }
    #game-over-overlay h2 { font-size: 1.5rem; margin-bottom: 8px; }
    #game-over-overlay #final-score { margin-bottom: 20px; }
    #game-over-overlay button {
      padding: 12px 24px;
      font-family: monospace;
      font-size: 1rem;
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      cursor: pointer;
    }
    #game-over-overlay button:hover { background: #000; color: #fff; }
  </style>
</head>
<body>
  <h1>TETRIS</h1>
  <div id="score">Score: 0</div>
  <div id="game-wrap">
    <canvas id="canvas" width="300" height="600"></canvas>
    <div id="game-over-overlay">
      <h2>GAME OVER</h2>
      <div id="final-score">Score: 0</div>
      <button id="restart-btn">RESTART</button>
    </div>
  </div>

  <div id="instructions-modal" class="modal">
    <h2>How to play</h2>
    <p><strong>Desktop</strong></p>
    <ul>
      <li>← → Move left / right</li>
      <li>↑ Rotate</li>
      <li>↓ Soft drop</li>
    </ul>
    <p><strong>Mobile</strong></p>
    <ul>
      <li>Swipe left / right to move</li>
      <li>Swipe up to rotate</li>
      <li>Swipe down to drop</li>
    </ul>
    <button id="start-btn">START</button>
  </div>

  <script>
(function () {
  const COLS = 10;
  const ROWS = 20;
  const BLOCK = 30;
  const GRID_COLOR = '#222';
  const PIECE_FILL = '#fff';
  const PIECE_BORDER = '#000';

  const SHAPES = [
    [[1,1,1,1]],                                     // I
    [[1,1],[1,1]],                                   // O
    [[0,1,0],[1,1,1]],                               // T
    [[0,1,1],[1,1,0]],                               // S
    [[1,1,0],[0,1,1]],                               // Z
    [[1,0,0],[1,1,1]],                               // J
    [[0,0,1],[1,1,1]]                                // L
  ];

  let canvas, ctx, grid, piece, nextPiece, x, y, score, gameOver, dropAt, lockAt;
  let dropInterval = 1000;
  let lockDelay = 500;
  let rafId;

  function init() {
    canvas = document.getElementById('canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    document.getElementById('start-btn').onclick = startGame;
    document.getElementById('restart-btn').onclick = startGame;
    document.addEventListener('keydown', onKeyDown);
    setupTouch();
  }

  function resizeCanvas() {
    const wrap = document.getElementById('game-wrap');
    const maxH = Math.min(600, window.innerHeight * 0.85);
    const scale = maxH / (ROWS * BLOCK);
    const w = Math.floor(COLS * BLOCK * scale);
    const h = Math.floor(ROWS * BLOCK * scale);
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    if (grid) draw();
  }

  function newGrid() {
    return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
  }

  function randomPiece() {
    const i = Math.floor(Math.random() * SHAPES.length);
    return SHAPES[i].map(row => [...row]);
  }

  function startGame() {
    document.getElementById('instructions-modal').style.display = 'none';
    document.getElementById('game-over-overlay').classList.remove('visible');
    grid = newGrid();
    score = 0;
    gameOver = false;
    dropInterval = 1000;
    updateScore();
    spawn();
    dropAt = performance.now();
    lockAt = null;
    if (rafId) cancelAnimationFrame(rafId);
    loop();
  }

  function spawn() {
    piece = nextPiece || randomPiece();
    nextPiece = randomPiece();
    x = Math.floor((COLS - piece[0].length) / 2);
    y = 0;
    if (collides(x, y, piece)) {
      gameOver = true;
      document.getElementById('final-score').textContent = 'Score: ' + score;
      document.getElementById('game-over-overlay').classList.add('visible');
    }
  }

  function collides(px, py, p) {
    for (let r = 0; r < p.length; r++) {
      for (let c = 0; c < p[r].length; c++) {
        if (!p[r][c]) continue;
        const ny = py + r, nx = px + c;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && grid[ny][nx]) return true;
      }
    }
    return false;
  }

  function merge() {
    for (let r = 0; r < piece.length; r++) {
      for (let c = 0; c < piece[r].length; c++) {
        if (piece[r][c]) {
          const gy = y + r, gx = x + c;
          if (gy >= 0) grid[gy][gx] = 1;
        }
      }
    }
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r].every(c => c === 1)) {
        grid.splice(r, 1);
        grid.unshift(Array(COLS).fill(0));
        cleared++;
        r++;
      }
    }
    if (cleared > 0) {
      const points = [0, 100, 300, 500, 800][cleared];
      score += points;
      updateScore();
      if (dropInterval > 100) dropInterval = Math.max(100, dropInterval - 20);
    }
    spawn();
    lockAt = null;
  }

  function rotate() {
    if (gameOver) return;
    const w = piece[0].length, h = piece.length;
    const next = Array(w).fill(null).map(() => Array(h).fill(0));
    for (let r = 0; r < h; r++)
      for (let c = 0; c < w; c++)
        next[c][h - 1 - r] = piece[r][c];
    if (!collides(x, y, next)) piece = next;
  }

  function move(dx) {
    if (gameOver) return;
    if (!collides(x + dx, y, piece)) {
      x += dx;
      lockAt = null;
    }
  }

  function softDrop() {
    if (gameOver) return;
    if (!collides(x, y + 1, piece)) {
      y++;
      score += 1;
      updateScore();
      lockAt = null;
    } else {
      if (!lockAt) lockAt = performance.now();
      else if (performance.now() - lockAt > lockDelay) merge();
    }
  }

  function updateScore() {
    document.getElementById('score').textContent = 'Score: ' + score;
  }

  function draw() {
    const cw = canvas.width, ch = canvas.height;
    const cellW = cw / COLS, cellH = ch / ROWS;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, cw, ch);

    ctx.strokeStyle = GRID_COLOR;
    ctx.lineWidth = 1;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellW, 0);
      ctx.lineTo(i * cellW, ch);
      ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * cellH);
      ctx.lineTo(cw, i * cellH);
      ctx.stroke();
    }

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c]) drawBlock(c, r, cellW, cellH);
      }
    }

    if (piece && !gameOver) {
      for (let r = 0; r < piece.length; r++) {
        for (let col = 0; col < piece[r].length; col++) {
          if (piece[r][col]) drawBlock(x + col, y + r, cellW, cellH);
        }
      }
    }
  }

  function drawBlock(cx, cy, cellW, cellH) {
    const pad = 1;
    const x = cx * cellW + pad, y = cy * cellH + pad;
    const w = cellW - pad * 2, h = cellH - pad * 2;
    ctx.fillStyle = PIECE_FILL;
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = PIECE_BORDER;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }

  function loop(now = 0) {
    if (gameOver) return;
    draw();
    if (piece) {
      if (now - dropAt >= dropInterval) {
        if (!collides(x, y + 1, piece)) {
          y++;
          dropAt = now;
          lockAt = null;
        } else {
          if (!lockAt) lockAt = now;
          else if (now - lockAt >= lockDelay) {
            merge();
            dropAt = now;
          }
        }
      }
    }
    rafId = requestAnimationFrame(loop);
  }

  function onKeyDown(e) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); move(-1); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); move(1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); rotate(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); softDrop(); }
  }

  function setupTouch() {
    let startX, startY;
    canvas.addEventListener('touchstart', function (e) {
      e.preventDefault();
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', function (e) {
      e.preventDefault();
      if (gameOver || !e.changedTouches[0]) return;
      const endX = e.changedTouches[0].clientX;
      const endY = e.changedTouches[0].clientY;
      const dx = endX - startX, dy = endY - startY;
      const min = 30;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > min) move(1);
        else if (dx < -min) move(-1);
      } else {
        if (dy > min) softDrop();
        else if (dy < -min) rotate();
      }
    }, { passive: false });
  }

  init();
})();
  </script>
</body>
</html>
