<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B&W Tetris</title>
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --border-color: #fff;
            --grid-line: #222;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Prevent scrolling */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); /* Very subtle glow */
        }

        canvas {
            background-color: var(--bg-color);
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        #score-display {
            position: absolute;
            top: -40px;
            left: 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Modals */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: auto;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            max-width: 80%;
            margin-bottom: 10px;
        }

        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            margin-top: 30px;
            text-transform: uppercase;
            transition: background 0.2s, color 0.2s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* Game Over Overlay */
        #game-over-modal {
            z-index: 20;
        }
        
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Canvas is sized via JS to fit viewport height -->
        <canvas id="tetris"></canvas>
        
        <!-- Score -->
        <div id="score-display">SCORE: 00000</div>

        <!-- Start Screen Modal -->
        <div id="start-modal" class="modal">
            <h1>TETRIS</h1>
            <p><strong>CONTROLS:</strong></p>
            <div style="font-size: 12px; color: #ccc; margin-bottom: 10px;">DESKTOP / MOBILE</div>
            <p>&larr; &rarr; : Move<br>&uarr; / Swipe Up : Rotate<br>&darr; / Swipe Down : Drop</p>
            <button class="btn" id="start-btn">START GAME</button>
        </div>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="modal hidden">
            <h1 style="color: #fff;">GAME OVER</h1>
            <p id="final-score">SCORE: 00000</p>
            <button class="btn" id="restart-btn">RESTART</button>
        </div>
    </div>

<script>
    // --- CONFIGURATION & SETUP ---
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    
    // Game State
    let grid = [];
    let score = 0;
    let gameOver = false;
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let isPaused = true;

    // Visual Settings
    const BLOCK_SIZE = 24; // Size of one grid square in pixels
    const COLS = 10;
    const ROWS = 20;

    // DOM Elements
    const scoreElement = document.getElementById('score-display');
    const startModal = document.getElementById('start-modal');
    const gameOverModal = document.getElementById('game-over-modal');
    const finalScoreEl = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // --- PIECES DEFINITIONS (SRS Rotation approximated for minimal code) ---
    // Using simple matrix rotation logic
    const PIECES = [
        [[1, 1, 1], [0, 1, 0]], // I
        [[1, 1], [1, 1]],        // O (Z in B&W often looks like S)
        [[0, 1, 1], [1, 1, 0]], // S
        [[1, 1, 0], [0, 1, 1]], // Z
        [[0, 1, 0], [1, 1, 1]], // T
        [[1, 0, 0], [1, 1, 1]], // J
        [[0, 0, 1], [1, 1, 1]]  // L
    ];

    // --- CORE FUNCTIONS ---

    function resize() {
        // Calculate height to fit viewport with some padding
        const maxWidth = window.innerWidth - 20; 
        // Max ~600px tall per request, min aspect ratio roughly standard (10:20)
        let targetHeight = Math.min(600, window.innerHeight - 40); 
        
        // Calculate block size to fit height perfectly into grid rows
        const availableHeightPerBlock = targetHeight / ROWS;
        
        // Set canvas size directly to avoid blurry pixels or scaling issues
        canvas.width = maxWidth;
        canvas.height = targetHeight;

        // Update block size for rendering based on actual dimensions
        BLOCK_SIZE = targetHeight / ROWS;
    }

    function createGrid(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    // Draw a filled rectangle at x,y with width w and height h
    function drawFilledRect(x, y, w, h) {
        ctx.fillStyle = 'white';
        ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, (w - 2) * BLOCK_SIZE, (h - 2) * BLOCK_SIZE);
        
        // Optional: Inner black border for style (since piece has own border via fill)
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 1;
        ctx.strokeRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, w * BLOCK_SIZE, h * BLOCK_SIZE);
    }

    function drawGrid() {
        // Clear canvas
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1;
        
        const w = canvas.width / BLOCK_SIZE;
        const h = canvas.height / BLOCK_SIZE;

        // Vertical lines
        for (let i = 0; i <= w; i++) {
            ctx.beginPath();
            ctx.moveTo(i * BLOCK_SIZE, 0);
            ctx.lineTo(i * BLOCK_SIZE, canvas.height);
            ctx.stroke();
        }

        // Horizontal lines
        for (let i = 0; i <= h; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * BLOCK_SIZE);
            ctx.lineTo(canvas.width, i * BLOCK_SIZE);
            ctx.stroke();
        }
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    // The logic handles drawing the filled white area
                    // Since we want a "white piece with black border", 
                    // and grid is dark grey:
                    // We simply draw White Fill on the grid.
                    // The 'grid' lines are already drawn above.
                    
                    const pixelX = (x + offset.x) * BLOCK_SIZE;
                    const pixelY = (y + offset.y) * BLOCK_SIZE;

                    ctx.fillStyle = '#fff';
                    // Draw slightly smaller than block to show grid line underneath if needed
                    // but for this strict B&W look, drawing full block on top is fine 
                    // because strokeRect is already called in drawFilledRect?
                    // Let's stick to the simpler logic: Fill White. 
                    // To get the border effect, we can rely on the grid lines being slightly visible 
                    // or explicit strokes. The spec says "white with black border".
                    
                    ctx.fillRect(pixelX, pixelY, BLOCK_SIZE - 1, BLOCK_SIZE - 1);
                }
            });
        });
    }

    function collide(arena, player) {
        const m = player.matrix;
        const o = player.pos;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function createPiece(type) {
        // Map single char to matrix index in PIECES array
        // I=1, O=2, S=3, Z=4, T=5, J=6, L=7. 
        // For this simple engine, we use the raw matrix data directly.
        
        const pType = PIECES.indexOf(type);
        return {
            matrix: [...type], // Clone
            pos: {x: (COLS / 2 | 0) - 1, y: 0},
            score: 0
        };
    }

    function draw() {
        drawGrid(); // Always redraw grid background
        
        const player = game.player;
        drawMatrix(game.matrix, player.pos);
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function rotate(matrix, dir) {
        // Transpose and reverse for rotation
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }

            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;

            score += rowCount * 10; // Basic scoring
            rowCount *= 2;
        }
        updateScore();
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        const random = pieces[pieces.length * Math.random() | 0];
        
        // Get the matrix shape
        let matrixType = PIECES.indexOf(random) >= 0 ? null : random;
        
        // Simplified: Just pick a random index from our array directly
        const type = PIECES[Math.floor(Math.random() * PIECES.length)];
        
        game.player.matrix = createPiece(type);
        
        // Randomize initial position slightly to make it less jarring
        // But standard is usually locked at top, let's keep standard for simplicity
        game.player.pos.y = 0; 
        game.player.pos.x = (COLS / 2 | 0) - (game.player.matrix[0].length / 2 | 0);

        if (collide(arena, game.player)) {
            gameOver = true;
            game.gameOver = true; // flag for logic
            isPaused = false; // Stop loop until restart
            
            // Update UI
            finalScoreEl.innerText = "SCORE: " + String(score).padStart(5, '0');
            gameOverModal.classList.remove('hidden');
        }
    }

    function playerDrop() {
        game.player.pos.y++;
        if (collide(arena, game.player)) {
            game.player.pos.y--; // Undo move
            merge(arena, game.player); // Lock piece
            arenaSweep(); // Check lines
            playerReset(); // Spawn new
            return; 
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        if (!game.gameOver) {
            game.player.pos.x += dir;
            if (collide(arena, game.player)) {
                game.player.pos.x -= dir;
            }
        }
    }

    function playerRotate(dir) {
        const pos = game.player.pos.x;
        let offset = 1;
        rotate(game.player.matrix, dir);
        
        // Wall kick (basic)
        while (collide(arena, game.player)) {
            game.player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > game.player.matrix[0].length) {
                rotate(game.player.matrix, -dir); // Rotate back if fails
                game.player.pos.x = pos; // Reset X
                return;
            }
        }
    }

    function updateScore() {
        scoreElement.innerText = "SCORE: " + String(score).padStart(5, '0');
    }

    function resetGame() {
        arena.forEach(row => row.fill(0));
        score = 0;
        dropInterval = 1000;
        updateScore();
        playerReset();
        gameOver = false;
        game.gameOver = false;
        
        startModal.classList.add('hidden');
        gameOverModal.classList.add('hidden');
        isPaused = false;
    }

    // --- GAME LOOP ---

    const arena = createGrid(COLS, ROWS);
    const game = {
        player: null,
        matrix: null,
        gameOver: false,
        
        update: function(time) {
            if (isPaused) return;

            const delta = (time - lastTime) / 1000;
            dropCounter += delta;

            if (dropCounter > dropInterval / 1000) {
                playerDrop();
            }

            draw();
            lastTime = time;
        },
    };

    function loop(time = 0) {
        requestAnimationFrame(loop);
        game.update(time);
    }

    // --- CONTROLS ---

    // Keyboard
    document.addEventListener('keydown', event => {
        if (game.gameOver || isPaused) return;

        if (event.keyCode === 37) { // Left
            playerMove(-1);
        } else if (event.keyCode === 39) { // Right
            playerMove(1);
        } else if (event.keyCode === 40) { // Down
            playerDrop();
        } else if (event.keyCode === 38) { // Up
            playerRotate(1);
        }
    });

    // Mouse/Touch Swipe Logic
    let touchStartX = 0;
    let touchStartY = 0;
    
    canvas.addEventListener('touchstart', event => {
        touchStartX = event.touches[0].clientX;
        touchStartY = event.touches[0].clientY;
        if (game.gameOver) return; // Prevent scrolling on game over
    }, {passive: false});

    canvas.addEventListener('touchmove', event => {
       // Prevent default only for specific context, but usually we allow scroll 
       // unless it's inside a modal. However, request said "Responsive layout" implies standard scrolling outside.
       // But inside game logic:
       if (game.gameOver) return;
    }, {passive: false});

    canvas.addEventListener('touchend', event => {
        if (game.gameOver || isPaused) return;

        const touchEndX = event.changedTouches[0].clientX;
        const touchEndY = event.changedTouches[0].clientY;

        const dx = touchEndX - touchStartX;
        const dy = touchEndY - touchStartY;

        // Threshold to distinguish tap from swipe vs vertical drop/rotate
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            
            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal Swipe
                if (dx > 0) playerMove(1);
                else playerMove(-1);
            } else {
                // Vertical Swipe
                if (dy > 0) playerDrop(); // Down
                else playerRotate(1);     // Up
            }
        }
    });

    // --- UI Event Listeners ---
    
    startBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', resetGame);
    
    // Initial Setup
    resize(); // Set canvas initial size
    
    // Start Loop
    lastTime = performance.now();
    requestAnimationFrame(loop);

</script>
</body>
</html>
